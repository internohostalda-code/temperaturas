<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Temperaturas - Casa Quintana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 15px; font-family: sans-serif; }
        .bodega-card { border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: none; }
        .header-k61 { border-top: 5px solid #007bff; }
        .header-l62 { border-top: 5px solid #28a745; }
        .header-l100 { border-top: 5px solid #ffc107; }
        .titulo-bodega { font-weight: bold; padding: 10px; margin: 0; font-size: 1.1rem; }
        .circuito-box { background: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 6px; text-align: center; min-height: 85px; }
        .camara-label { font-size: 0.6rem; color: #6c757d; display: block; height: 24px; line-height: 1; font-weight: 500; margin-bottom: 2px; }
        .c-num { font-size: 0.8rem; font-weight: bold; display: block; color: #212529; }
        .form-control-sm { font-size: 0.9rem; padding: 0.2rem; }
    </style>
</head>
<body>

<div class="container" style="max-width: 700px;">
    <h3 class="text-center mb-4">Registro Casa Quintana</h3>
    
    <form id="formTemperaturas" onkeydown="return event.key != 'Enter';">
        
        <div class="card bodega-card header-k61">
            <h5 class="titulo-bodega text-primary">Bodega K61</h5>
            <div class="card-body p-2">
                <div class="row g-2">
                    <script>
                        const nK61 = ["Planta Alta","Planta Alta","Planta Alta","Cámara 1","Cámara 2","Sótano","Sótano","Sótano"];
                        nK61.forEach((n, i) => {
                            document.write(`<div class="col-3"><div class="circuito-box"><span class="camara-label">${n}</span><span class="c-num">C${i+1}</span><input type="number" step="0.1" name="K61_C${i+1}" class="form-control form-control-sm text-center" required></div></div>`);
                        });
                    </script>
                </div>
                <input type="text" name="OBS_K61" class="form-control form-control-sm mt-2" placeholder="Observaciones generales K61">
            </div>
        </div>

        <div class="card bodega-card header-l62">
            <h5 class="titulo-bodega text-success">Bodega L62</h5>
            <div class="card-body p-2">
                <div class="row g-2">
                    <script>
                        const nL62 = ["Sótano Chico","Sótano Gde","Sótano Gde","Planta Alta","Planta Alta","Planta Alta","Cámara 1","Cámara 2"];
                        nL62.forEach((n, i) => {
                            document.write(`<div class="col-3"><div class="circuito-box"><span class="camara-label">${n}</span><span class="c-num">C${i+1}</span><input type="number" step="0.1" name="L62_C${i+1}" class="form-control form-control-sm text-center" required></div></div>`);
                        });
                    </script>
                </div>
                <input type="text" name="OBS_L62" class="form-control form-control-sm mt-2" placeholder="Observaciones generales L62">
            </div>
        </div>

        <div class="card bodega-card header-l100">
            <h5 class="titulo-bodega text-warning">Bodega L100</h5>
            <div class="card-body p-2">
                <div class="row g-2">
                    <script>
                        const nL100 = ["Cámara 1","Cámara 2","Cámara 3","Cámara 4","Cámara 5","Sótano","Sótano","Sótano"];
                        nL100.forEach((n, i) => {
                            document.write(`<div class="col-3"><div class="circuito-box"><span class="camara-label">${n}</span><span class="c-num">C${i+1}</span><input type="number" step="0.1" name="L100_C${i+1}" class="form-control form-control-sm text-center" required></div></div>`);
                        });
                    </script>
                </div>
                <input type="text" name="OBS_L100" class="form-control form-control-sm mt-2" placeholder="Observaciones generales L100">
            </div>
        </div>

        <button type="button" onclick="subir()" id="btn" class="btn btn-primary w-100 btn-lg mt-3 mb-5 shadow">SUBIR A LA NUBE</button>
    </form>
</div>

<script>
    const MI_URL_NUBE = "TU_URL_AQUI"; // <--- PEGA TU URL AQUÍ

    function subir() {
        const f = document.getElementById('formTemperaturas');
        if (!f.checkValidity()) { f.reportValidity(); return; }

        document.getElementById('btn').disabled = true;
        document.getElementById('btn').innerText = "ENVIANDO...";

        const fd = new FormData(f);
        const lecturas = [];
        const obs = [];

        fd.forEach((v, k) => {
            if (k.startsWith('OBS_')) {
                obs.push({ b: k.replace('OBS_', ''), t: v });
            } else {
                const p = k.split('_');
                lecturas.push({ b: p[0], c: p[1], v: v });
            }
        });

        fetch(MI_URL_NUBE, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ lecturas, obs })
        })
        .then(() => {
            alert("✅ Datos guardados en Excel.");
            f.reset();
        })
        .catch(() => alert("❌ Error al enviar."))
        .finally(() => {
            document.getElementById('btn').disabled = false;
            document.getElementById('btn').innerText = "SUBIR A LA NUBE";
        });
    }
</script>
</body>
</html>
