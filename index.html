<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Temperaturas - Casa Quintana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .bodega-card { border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: none; }
        .header-k61 { border-top: 5px solid #007bff; }
        .header-l62 { border-top: 5px solid #28a745; }
        .header-l100 { border-top: 5px solid #ffc107; }
        .titulo-bodega { font-weight: bold; padding: 10px; margin: 0; }
        .circuito-box { background: #fff; border: 1px solid #ddd; border-radius: 5px; padding: 8px; text-align: center; }
        .input-group-text { font-size: 0.75rem; background-color: #f1f3f5; }
    </style>
</head>
<body>

<div class="container" style="max-width: 800px;">
    <h2 class="text-center mb-4">Registro de Temperaturas</h2>
    
    <form id="formTemperaturas" onkeydown="return event.key != 'Enter';">
        
        <div class="card bodega-card header-k61">
            <h5 class="titulo-bodega text-primary">Bodega K61</h5>
            <div class="card-body">
                <div class="row g-2">
                    <script>
                        for(let i=1; i<=8; i++) {
                            document.write(`
                                <div class="col-3 col-md-3">
                                    <div class="circuito-box">
                                        <small class="text-muted">C${i}</small>
                                        <div class="input-group input-group-sm">
                                            <input type="number" step="0.1" name="K61_C${i}" class="form-control text-center" required>
                                            <span class="input-group-text">°C</span>
                                        </div>
                                    </div>
                                </div>
                            `);
                        }
                    </script>
                </div>
                <div class="mt-3">
                    <label class="small fw-bold text-muted">Observaciones Generales K61:</label>
                    <textarea name="OBS_K61" class="form-control form-control-sm" rows="2" placeholder="Detalles de la bodega K61..."></textarea>
                </div>
            </div>
        </div>

        <div class="card bodega-card header-l62">
            <h5 class="titulo-bodega text-success">Bodega L62</h5>
            <div class="card-body">
                <div class="row g-2">
                    <script>
                        for(let i=1; i<=8; i++) {
                            document.write(`
                                <div class="col-3 col-md-3">
                                    <div class="circuito-box">
                                        <small class="text-muted">C${i}</small>
                                        <div class="input-group input-group-sm">
                                            <input type="number" step="0.1" name="L62_C${i}" class="form-control text-center" required>
                                            <span class="input-group-text">°C</span>
                                        </div>
                                    </div>
                                </div>
                            `);
                        }
                    </script>
                </div>
                <div class="mt-3">
                    <label class="small fw-bold text-muted">Observaciones Generales L62:</label>
                    <textarea name="OBS_L62" class="form-control form-control-sm" rows="2" placeholder="Detalles de la bodega L62..."></textarea>
                </div>
            </div>
        </div>

        <div class="card bodega-card header-l100">
            <h5 class="titulo-bodega text-warning">Bodega L100</h5>
            <div class="card-body">
                <div class="row g-2">
                    <script>
                        for(let i=1; i<=8; i++) {
                            document.write(`
                                <div class="col-3 col-md-3">
                                    <div class="circuito-box">
                                        <small class="text-muted">C${i}</small>
                                        <div class="input-group input-group-sm">
                                            <input type="number" step="0.1" name="L100_C${i}" class="form-control text-center" required>
                                            <span class="input-group-text">°C</span>
                                        </div>
                                    </div>
                                </div>
                            `);
                        }
                    </script>
                </div>
                <div class="mt-3">
                    <label class="small fw-bold text-muted">Observaciones Generales L100:</label>
                    <textarea name="OBS_L100" class="form-control form-control-sm" rows="2" placeholder="Detalles de la bodega L100..."></textarea>
                </div>
            </div>
        </div>

        <button type="button" onclick="validarYEnviar()" id="btnEnviar" class="btn btn-primary w-100 btn-lg mt-3 mb-5 shadow">SUBIR A LA NUBE</button>
    </form>
</div>
